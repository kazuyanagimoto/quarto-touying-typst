title: Touying Slides for Quarto
author: Kazuharu Yanagimoto
version: 0.0.1
quarto-required: ">=1.8.0"
contributes:
  format:
    typst:
      # --- Touying bridge -----------------------------------------------------
      shortcodes:
        - shortcodes.lua
      filters:
        - touying.lua
        - environment.lua
      template-partials:
        - typst-template.typ
        - typst-show.typ
      # --- Sensible defaults (override in your document front matter) ----------
      theme: default
      aspect-ratio: "16-9"
