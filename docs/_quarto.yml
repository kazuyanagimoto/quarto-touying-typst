project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - gallery.qmd
    - tutorial.qmd
    - gallery/*.qmd
  resources:
    - slides/
    - static/thumbnail.png   # referenced by README via absolute URL, so copy it explicitly

# Never execute code during a render: the `full` deck's R chunks are run
# locally and the results committed under `_freeze/`, so CI (and `just`) reuse
# them and need no R toolchain. Re-render locally after editing `full.qmd` to
# refresh the cache.
execute:
  freeze: true

website:
  title: "quarto-touying-typst"
  description: "Touying slides for Quarto, with a gallery of built-in themes."
  site-url: https://kazuyanagimoto.com/quarto-touying-typst/
  repo-url: https://github.com/kazuyanagimoto/quarto-touying-typst
  navbar:
    left:
      - text: Tutorial
        href: tutorial.qmd
      - text: Gallery
        href: gallery.qmd
    right:
      - icon: github
        href: https://github.com/kazuyanagimoto/quarto-touying-typst

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    lightbox: true
