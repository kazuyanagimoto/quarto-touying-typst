name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  THEMES: "default simple metropolis dewdrop university aqua stargazer clean"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install touying-exporter
        run: pip install touying

      - name: Smoke test (standalone template)
        run: quarto render template.qmd --to touying-typst

      - name: Build navigable HTML decks
        run: |
          mkdir -p docs/slides
          for th in $THEMES; do
            quarto render docs/gallery/$th.qmd --to touying-typst -M keep-typ:true
            touying compile docs/gallery/$th.typ --format html --output docs/slides/$th.html
          done

      - name: Render gallery site
        run: quarto render docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
