name: Render

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render template (smoke test)
        run: quarto render template.qmd --to touying-typst

      - name: Render gallery site (all themes)
        run: quarto render

      - name: Upload rendered site
        uses: actions/upload-artifact@v5
        with:
          name: site
          path: _site
