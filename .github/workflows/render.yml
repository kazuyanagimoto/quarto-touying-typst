name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # push the built site to the gh-pages branch

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install touying-exporter
        # Pin Typst < 0.15: the `flow` deck pulls touying-flow 1.2.0 -> mitex
        # 0.2.5, which still uses the `kai` math symbol that Typst deprecated in
        # 0.14 and removed in 0.15. touying-flow has no release that bumps mitex,
        # so cap the exporter's Typst until it does.
        run: pip install touying "typst<0.15"

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Build decks and site
        run: |
          just template   # smoke-test the standalone template
          just decks      # navigable HTML decks via touying-exporter
          just render     # the docs website -> docs/_site

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_site
          publish_branch: gh-pages
          force_orphan: true
