name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  THEMES: "metropolis university dewdrop aqua stargazer simple default"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install touying-exporter
        run: pip install touying

      - name: Smoke test (standalone template)
        run: quarto render template.qmd --to touying-typst

      - name: Build navigable HTML decks
        run: |
          mkdir -p slides
          for th in $THEMES; do
            quarto render examples/$th.qmd --to touying-typst -M keep-typ:true -o $th.pdf
            touying compile examples/$th.typ --format html --output slides/$th.html
          done

      - name: Render gallery site
        run: quarto render

      - name: Upload site
        uses: actions/upload-artifact@v5
        with:
          name: site
          path: _site
